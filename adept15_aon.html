const S = { pairs:[], used:new Set(), responses:[], coherenceErrs:0, generating:false, usingFallback:false };

// ── JSON EXTRACTION ROBUSTE ──────────────────────────────────────────────────
function extractJSON(txt) {
  // Remove markdown fences
  txt = txt.replace(/```json|```/g,'').trim();
  // Find first [ and last ]
  const start = txt.indexOf('[');
  const end   = txt.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('No JSON array found');
  return JSON.parse(txt.slice(start, end+1));
}

// ── API CALL ─────────────────────────────────────────────────────────────────
async function callAPI(prompt, maxTokens=3500) {
  const models = [
    'anthropic/claude-3-haiku-20240307',
    'openai/gpt-4o-mini',
    'mistralai/mistral-7b-instruct',
  ];

  for (const model of models) {
    try {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method:'POST',
        headers:{
          'Authorization':`Bearer ${API_KEY}`,
          'Content-Type':'application/json',
          'HTTP-Referer':'https://localhost',
          'X-Title':'ADEPT-15 Training'
        },
        body: JSON.stringify({
          model,
          messages:[{role:'user',content:prompt}],
          max_tokens: maxTokens,
          temperature: 0.88,
        })
      });
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.choices?.[0]?.message?.content) continue;
      return data.choices[0].message.content;
    } catch(e) {
      console.warn(`Model ${model} failed:`, e);
    }
  }
  throw new Error('All models failed');
}

// ── GENERATION ───────────────────────────────────────────────────────────────
async function genBatch(batchIdx, focus, count) {
  const seed = `${SID}_${batchIdx}_${Date.now()}`;
  const prompt = `Génère exactement ${count} paires ipsatives pour un test psychométrique ADEPT-15. Seed unique: ${seed}

FOCUS: ${focus}

RÈGLES:
- Deux statements positifs/désirables en contexte professionnel, en FRANÇAIS
- Première personne, 10-20 mots par statement, style naturel et professionnel
- Jamais de vocabulaire aviation explicite (pas d'avion, cockpit, pilote, vol, etc.)
- dir:1 = statement positif normal, dir:-1 = statement négatif/honnête pour tester cohérence, dir:0 = piège "toujours/jamais/jamais d'erreur"
- TRAITS VALIDES: composure, positivity, confidence, cooperativeness, mastery, directness, adaptability, empathy, structure, drive, persistence, rulebased, sociability, ambition, innovation

RETOURNE UNIQUEMENT ce JSON array, rien d'autre:
[{"id":"${seed}_1","L":{"t":"composure","dir":1,"tx":"statement gauche"},"R":{"t":"cooperativeness","dir":1,"tx":"statement droite"}}]`;

  const txt = await callAPI(prompt, 3500);
  return extractJSON(txt);
}

async function generateAll() {
  const bar    = document.getElementById('splashBar');
  const status = document.getElementById('splashStatus');
  const errEl  = document.getElementById('splashErr');

  const batches = [
    { focus: `12 paires normales (dir:1): 4× composure vs cooperativeness/mastery/directness, 3× composure vs structure/drive/rulebased, 2× composure vs ambition/innovation, 2× intra-composure différents, 1× positivity vs cooperativeness`, count:13 },
    { focus: `12 paires variées: 3× cooperativeness/mastery vs structure/drive/rulebased, 2× CRM vs ambition/innovation, 2× rigueur vs ambition, 2× intra-CRM (assertivité vs coopération, accepter-correction vs directness), 2× intra-rigueur, 1× inversion négative (dir:-1)`, count:13 },
    { focus: `14 paires mixtes: 3× assertivité légitime vs dominance sociale, 2× empathy vs structure, 2× inversion négative (dir:-1) sur composure et cooperativeness, 2× pièges "toujours/jamais" (dir:0), 2× adaptability vs rulebased, 1× confidence vs mastery, 2× sociability/ambition vs cooperativeness`, count:14 },
  ];

  const results = [];
  for (let i=0; i<batches.length; i++) {
    try {
      status.textContent = `Génération batch ${i+1}/3…`;
      const pairs = await genBatch(i, batches[i].focus, batches[i].count);
      results.push(...pairs);
      bar.style.width = Math.round((i+1)/3*90) + '%';
    } catch(e) {
      console.warn(`Batch ${i} failed:`, e);
    }
  }

  if (results.length < 20) {
    // Fallback: shuffle fallback pairs
    console.warn('API failed, using fallback pairs');
    S.usingFallback = true;
    errEl.style.display = 'block';
    errEl.textContent = 'Génération IA indisponible — session de secours chargée (questions fixes)';
    S.pairs = [...FALLBACK].sort(()=>Math.random()-0.5);
  } else {
    S.pairs = results;
  }

  bar.style.width = '100%';
  status.textContent = `${S.pairs.length} paires prêtes · Session ${SID}`;
}

// ── ADAPTIVE REFILL ──────────────────────────────────────────────────────────
async function adaptiveRefill() {
  if (S.generating || S.usingFallback) return;
  S.generating = true;
  document.getElementById('genPill').classList.add('show');

  const least = Object.entries(T).sort((a,b)=>a[1].n-b[1].n).slice(0,5).map(([k])=>k);
  try {
    const pairs = await genBatch(99, `8 paires ciblant ces traits sous-représentés: ${least.join(', ')}. Inclure 1 inversion (dir:-1) et 1 piège (dir:0).`, 8);
    S.pairs.push(...pairs);
  } catch(e) {
    console.warn('Refill failed:', e);
  } finally {
    S.generating = false;
    document.getElementById('genPill').classList.remove('show');
  }
}

// ── IRT SCORING ──────────────────────────────────────────────────────────────
function applyResponse(pairId, val) {
  const pair = S.pairs.find(p=>p.id===pairId);
  if (!pair) return;

  const lStr = (8-val)/7, rStr = (val-1)/7;

  const upd = (key, dir, str) => {
    if (!T[key]) return;
    let impact;
    if (dir===0) impact = str>0.85 ? 15 : str*80;
    else if (dir===1) impact = str*100;
    else impact = (1-str)*100;
    const lr = 0.6/(T[key].n+1);
    T[key].score = Math.max(5, Math.min(95, Math.round(T[key].score + lr*(impact-T[key].score))));
    T[key].n++;
  };

  upd(pair.L.t, pair.L.dir, lStr);
  upd(pair.R.t, pair.R.dir, rStr);

  // Coherence
  if (pair.L.dir===-1 || pair.R.dir===-1) {
    const inv = pair.L.dir===-1 ? {t:pair.L.t, str:lStr} : {t:pair.R.t, str:rStr};
    S.responses.filter(r => {
      const p = S.pairs.find(x=>x.id===r.pairId);
      return p && p.L.dir===1 && p.R.dir===1 && (p.L.t===inv.t||p.R.t===inv.t);
    }).forEach(r => {
      const p = S.pairs.find(x=>x.id===r.pairId);
      const posStr = p.L.t===inv.t ? (8-r.val)/7 : (r.val-1)/7;
      if (posStr>0.65 && inv.str>0.65) S.coherenceErrs++;
    });
  }

  S.used.add(pairId);
  S.responses.push({pairId, val});
}

// ── SELECT ADAPTIVE ──────────────────────────────────────────────────────────
function selectNext(n=2) {
  const avail = S.pairs.filter(p=>!S.used.has(p.id));
  const leastSet = new Set(Object.entries(T).sort((a,b)=>a[1].n-b[1].n).slice(0,8).map(([k])=>k));
  return avail
    .map(p=>({ p, s: (leastSet.has(p.L.t)?8-T[p.L.t].n:0) + (leastSet.has(p.R.t)?8-T[p.R.t].n:0) + Math.random()*2 }))
    .sort((a,b)=>b.s-a.s)
    .slice(0,n).map(x=>x.p);
}

// ── UI ────────────────────────────────────────────────────────────────────────
let curPairs=[], curAns={};

function setProgress() {
  document.getElementById('prog').textContent = Math.round(S.responses.length/TOTAL*100)+'%';
}

function renderPairs(pairs) {
  curPairs=pairs; curAns={};
  document.getElementById('app').innerHTML = `
    <div class="main">
      <p class="page-title">Avec laquelle de ces affirmations vous identifiez-vous le plus&nbsp;?</p>
      ${pairs.map(renderCard).join('')}
      <div class="nav"><button class="btn-next" id="btnNext" onclick="onNext()">Suivant</button></div>
    </div>`;
}

function renderCard(p) {
  return `<div class="pair-card">
    <div class="statements-row">
      <div class="stmt">${p.L.tx}</div>
      <div class="stmt-divider"></div>
      <div class="stmt stmt-right">${p.R.tx}</div>
    </div>
    <div class="scale-wrap">
      <div class="scale-track">
        <div class="scale-line"></div>
        <div class="scale-dots">
          ${[1,2,3,4,5,6,7].map(v=>`<div class="dot${v===1||v===7?' end':''}" id="d_${p.id}_${v}" onclick="pick('${p.id}',${v})"></div>`).join('')}
        </div>
      </div>
      <div class="scale-labels">
        <span>Tout à fait d'accord</span>
        <div class="mid-labels"><span>Plutôt d'accord</span><span>Plutôt d'accord</span></div>
        <span>Tout à fait d'accord</span>
      </div>
    </div>
  </div>`;
}

function pick(pairId, val) {
  for(let v=1;v<=7;v++){
    const el=document.getElementById(`d_${pairId}_${v}`);
    if(el) el.classList.toggle('sel',v===val);
  }
  curAns[pairId]=val;
  const done=curPairs.every(p=>curAns[p.id]!==undefined);
  document.getElementById('btnNext')?.classList.toggle('on',done);
}

async function onNext() {
  curPairs.forEach(p=>{ if(curAns[p.id]!==undefined) applyResponse(p.id,curAns[p.id]); });
  setProgress();
  if(S.responses.length>=TOTAL){ renderResults(); return; }
  const rem=S.pairs.filter(p=>!S.used.has(p.id)).length;
  if(rem<8&&!S.generating) adaptiveRefill();
  if(rem<2){ await adaptiveRefill(); }
  const next=selectNext(2);
  if(!next.length){ renderResults(); return; }
  renderPairs(next);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── RESULTS ──────────────────────────────────────────────────────────────────
function famScore(fam){ const k=Object.keys(T).filter(x=>T[x].fam===fam); return Math.round(k.reduce((s,x)=>s+T[x].score,0)/k.length); }

function renderResults(){
  document.getElementById('prog').textContent='100%';
  const fs=Object.fromEntries(Object.entries(FAM).map(([k,f])=>([k,{...f,score:famScore(k)}])));
  const fit=Math.round(Object.entries(fs).map(([,f])=>Math.max(0,100-Math.abs(f.score-f.bench)*1.5)).reduce((a,b)=>a+b,0)/4);
  const coh=Math.max(15,Math.round(100-S.coherenceErrs*14));
  const fc=fit>=75?'#2a8a2a':fit>=55?'#c07800':'#cc0000';
  const cc=coh>=75?'#2a8a2a':coh>=55?'#c07800':'#cc0000';

  document.getElementById('app').innerHTML=`
    <div class="res-wrap">
      <div class="res-card">
        <p style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Évaluation terminée · ${S.responses.length} items · Session ${SID}${S.usingFallback?' · Mode secours':''}</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
          <div><p class="score-lbl">Adéquation profil</p><p class="big-score" style="color:${fc}">${fit}%</p><p class="score-sub">benchmark Ryanair FO</p></div>
          <div><p class="score-lbl">Index de cohérence</p><p class="big-score" style="color:${cc}">${coh}</p><p class="score-sub">consistance des réponses</p></div>
        </div>
      </div>

      <div class="res-card">
        <p style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Dimensions · score vs benchmark Ryanair FO</p>
        ${Object.entries(fs).map(([,f])=>`
          <div class="bar-row">
            <div class="bar-lbl"><span style="font-weight:600;color:${f.color}">${f.name}</span><span style="color:#aaa">${f.score}/100 <span style="color:${f.color}">cible: ${f.bench}</span></span></div>
            <div class="bar-bg">
              <div class="bar-fill" style="width:${f.score}%;background:${f.color};opacity:.6"></div>
              <div class="bar-marker" style="left:${f.bench}%"><span class="bar-marker-lbl">cible</span></div>
            </div>
          </div>`).join('')}
      </div>

      <div class="res-card">
        <p style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px">Traits individuels (15)</p>
        ${Object.entries(T).map(([,t])=>`
          <div class="bar-row">
            <div class="bar-lbl"><span style="color:#555;font-size:12px">${t.name}</span><span style="color:#bbb;font-size:11px">${t.score}/100 · ${t.n} items</span></div>
            <div class="bar-bg">
              <div class="bar-fill" style="width:${t.score}%;background:${FAM[t.fam].color};opacity:.4"></div>
              <div class="bar-marker" style="left:${t.bench}%"></div>
            </div>
          </div>`).join('')}
      </div>

      <div class="res-card">
        <p style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px">Analyse</p>
        ${buildAnalysis(fs,coh)}
      </div>

      <div style="text-align:center;margin-top:24px;margin-bottom:40px">
        <button onclick="location.reload()" style="background:#cc0000;color:white;border:none;padding:12px 44px;font-size:15px;cursor:pointer;">
          Nouvelle session
        </button>
      </div>
    </div>`;
}

function buildAnalysis(fs,coh){
  const ok=t=>`<p class="a-line" style="color:#2a8a2a">✓ ${t}</p>`;
  const warn=t=>`<p class="a-line" style="color:#cc0000">⚠ ${t}</p>`;
  const mid=t=>`<p class="a-line" style="color:#c07800">→ ${t}</p>`;
  const R=fs.R,O=fs.O,Y=fs.Y,G=fs.G;
  const verdict=R.score>=65&&O.score>=60&&Y.score>=60&&coh>=65;
  return [
    R.score>=R.bench-8 ? ok(`<strong>Composure</strong> : zone cible (${R.score}). Stabilité émotionnelle validée.`) : warn(`<strong>Composure</strong> : sous le benchmark (${R.score} vs ${R.bench}). Axe prioritaire.`),
    O.score>=O.bench-8 ? ok(`<strong>CRM & Coopération</strong> : signal solide (${O.score}).`) : warn(`<strong>CRM & Coopération</strong> : insuffisant pour FO LCC (${O.score} vs ${O.bench}).`),
    Y.score>=Y.bench-8 ? ok(`<strong>Rigueur & Structure</strong> : dans les normes (${Y.score}).`) : warn(`<strong>Rigueur & Structure</strong> : trop faible pour opérateur process-driven (${Y.score} vs ${Y.bench}).`),
    G.score>68 ? mid(`<strong>Ambition & Innovation</strong> : score élevé (${G.score}) — risque profil individualiste.`) : ok(`<strong>Ambition & Innovation</strong> : zone acceptable (${G.score}).`),
    coh<60 ? warn(`<strong>Cohérence</strong> : incohérences détectées (${coh}/100) — risque flag AON.`) : ok(`<strong>Cohérence</strong> : profil consistant (${coh}/100).`),
    verdict
      ? `<p class="a-line" style="color:#2a8a2a;font-weight:700;border-top:1px solid #eee;padding-top:10px;margin-top:6px">✓ Profil compatible Ryanair FO — bonne base pour le repassage</p>`
      : `<p class="a-line" style="color:#cc0000;font-weight:700;border-top:1px solid #eee;padding-top:10px;margin-top:6px">⚠ Dimensions sous benchmark — travailler les axes en rouge avant repassage</p>`,
  ].join('');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
(async function(){
  try {
    await generateAll();
  } catch(e) {
    S.pairs = [...FALLBACK].sort(()=>Math.random()-0.5);
    S.usingFallback = true;
    document.getElementById('splashErr').style.display='block';
    document.getElementById('splashErr').textContent='Session de secours — 40 questions fixes chargées';
    document.getElementById('splashBar').style.width='100%';
    document.getElementById('splashStatus').textContent='Prêt';
  }
  await new Promise(r=>setTimeout(r,700));
  document.getElementById('splash').style.display='none';
  renderPairs(selectNext(2));
  setProgress();
})();
</script>
