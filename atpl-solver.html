<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATPL Speed</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
:root{--bg:#070a10;--card:#111825;--accent:#00ffab;--dim:#00ffab15;--t1:#e4eaf2;--t2:#5d6e82;--border:#1a2536;--red:#ff3860;--warn:#ffaa00}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── BIG ANSWER ── */
#answerOverlay{
  position:fixed;top:0;left:0;right:0;z-index:200;
  text-align:center;padding:6px 12px;
  background:linear-gradient(180deg,#00ffab28,transparent 80%);
  pointer-events:none;opacity:0;transition:opacity .2s;
}
#answerOverlay.show{opacity:1}
#bigLetter{font-size:90px;font-weight:800;color:var(--accent);line-height:1;text-shadow:0 0 50px #00ffab50}
#bigWhy{font-size:11px;color:var(--accent);opacity:.8;max-width:90vw;margin:2px auto 0;line-height:1.4}

/* ── TOP BAR ── */
.bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.bar-left{display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--t2);transition:background .3s}
.dot.on{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.dot.wait{background:var(--warn);animation:pulse .5s ease infinite}
.dot.scan{background:var(--warn);animation:spin .4s linear infinite}
@keyframes pulse{50%{opacity:.3}}
@keyframes spin{50%{transform:scale(1.6);opacity:.3}}
.bar-label{font-size:11px;color:var(--t2)}
.bar-label span{color:var(--accent)}
.bar-right{display:flex;gap:6px}
.bar-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--t2);padding:3px 8px;font:10px 'JetBrains Mono',monospace;cursor:pointer}

/* ── CAMERA (full width) ── */
.cam-area{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
.cam-area video{width:100%;height:100%;object-fit:cover;display:block}
.cam-area canvas{display:none}

/* scan line */
.scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);top:0;opacity:0;transition:opacity .2s}
.scanline.on{opacity:1;animation:scanmove 1.5s ease-in-out infinite}
@keyframes scanmove{0%{top:0}50%{top:100%}100%{top:0}}

/* corner markers */
.c{position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid;opacity:.4}
.c1{top:8px;left:8px;border-width:2px 0 0 2px}.c2{top:8px;right:8px;border-width:2px 2px 0 0}
.c3{bottom:8px;left:8px;border-width:0 0 2px 2px}.c4{bottom:8px;right:8px;border-width:0 2px 2px 0}

/* overlay when camera not started */
.cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:8px;transition:opacity .3s}
.cam-overlay.hide{opacity:0;pointer-events:none}
.cam-overlay span{font-size:12px;color:var(--t2)}

/* ── BOTTOM PANEL ── */
.bottom{flex-shrink:0;padding:8px 12px;background:var(--card);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}

.start-btn{
  width:100%;padding:14px;border:none;border-radius:10px;
  font:700 14px 'JetBrains Mono',monospace;cursor:pointer;
  background:var(--accent);color:var(--bg);transition:all .15s;
}
.start-btn:active{transform:scale(.97)}
.start-btn:disabled{opacity:.3}
.start-btn.running{background:var(--red)}

/* Answer stream */
.stream{display:flex;flex-direction:column;gap:4px;max-height:25vh;overflow-y:auto;scrollbar-width:thin}
.stream-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border-radius:6px;font-size:11px;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-6px)}}
.stream-letter{font-size:20px;font-weight:800;color:var(--accent);min-width:24px;text-align:center}
.stream-text{flex:1;color:var(--t2);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.stream-time{color:var(--t2);opacity:.4;font-size:9px;white-space:nowrap}
.stream-err{color:var(--red);font-size:10px;padding:4px 8px;background:#ff386010;border-radius:4px}

/* ── SETUP ── */
.setup-overlay{
  position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.setup-overlay.hide{display:none}
.setup-box{max-width:360px;width:100%;display:flex;flex-direction:column;gap:14px}
.setup-box h2{font-size:16px;font-weight:700}
.setup-box p{font-size:12px;color:var(--t2);line-height:1.5}
.setup-box a{color:var(--accent)}
.setup-input{
  width:100%;padding:12px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--t1);font:12px 'JetBrains Mono',monospace;outline:none;
}
.setup-input:focus{border-color:var(--accent)}
</style>
</head>
<body>

<!-- Answer overlay -->
<div id="answerOverlay">
  <div id="bigLetter"></div>
  <div id="bigWhy"></div>
</div>

<!-- Setup -->
<div class="setup-overlay" id="setup">
  <div class="setup-box">
    <h2>ATPL Speed Solver</h2>
    <p>100% gratuit. Scan auto hands-free.</p>
    <p>1. Va sur <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a><br>
       2. Crée un compte (Google login, 10s)<br>
       3. Crée une API key → colle-la ici</p>
    <input class="setup-input" id="keyInput" placeholder="sk-or-..." autocomplete="off" spellcheck="false">
    <button class="start-btn" onclick="saveKey()">Démarrer</button>
  </div>
</div>

<!-- Top bar -->
<div class="bar">
  <div class="bar-left">
    <div class="dot" id="dot"></div>
    <div class="bar-label" id="statusLabel">Prêt</div>
  </div>
  <div class="bar-right">
    <div class="bar-label">Résolues: <span id="countEl">0</span></div>
    <button class="bar-btn" onclick="showSetup()">API</button>
  </div>
</div>

<!-- Camera -->
<div class="cam-area" id="camArea">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cvs"></canvas>
  <div class="scanline" id="scanline"></div>
  <div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div>
  <div class="cam-overlay" id="camOverlay">
    <span>Appuie START pour commencer</span>
  </div>
</div>

<!-- Bottom -->
<div class="bottom">
  <button class="start-btn" id="mainBtn" onclick="toggleRun()">START</button>
  <div class="stream" id="stream"></div>
</div>

<script>
// ══════════════════════════
// CONFIG
// ══════════════════════════
const INTERVAL = 6000;      // Scan every 6s
const CHANGE_THRESH = 4;    // % pixels diff to count as "new question"
const PX_SENS = 15;         // Per-pixel diff sensitivity
const THUMB = 96;            // Detection thumbnail
const IMG_MAX = 600;         // Max image dim for API
const IMG_Q = 0.4;           // JPEG quality for API

// ══════════════════════════
// MODELS (all free, all vision)
// ══════════════════════════
const MODELS = [
  'openrouter/free',
  'openrouter/healer-alpha',
  'qwen/qwen2.5-vl-72b-instruct:free',
  'qwen/qwen2.5-vl-32b-instruct:free',
  'moonshotai/kimi-vl-a3b-thinking:free',
  'meta-llama/llama-4-scout:free',
  'google/gemma-3-27b-it:free',
  'mistralai/mistral-small-3.1-24b-instruct:free'
];

// ══════════════════════════
// STATE
// ══════════════════════════
let apiKey = localStorage.getItem('or_k') || '';
let running = false;
let busy = false;
let timer = null;
let lastSentFrame = null;
let modelIdx = 0;
let count = 0;
let stream = null;

const vid = document.getElementById('vid');
const cvs = document.getElementById('cvs');

// Init
if (apiKey) document.getElementById('setup').classList.add('hide');

// ══════════════════════════
// SETUP
// ══════════════════════════
function saveKey() {
  const k = document.getElementById('keyInput').value.trim();
  if (!k) return;
  apiKey = k;
  localStorage.setItem('or_k', k);
  document.getElementById('setup').classList.add('hide');
}
function showSetup() {
  document.getElementById('setup').classList.remove('hide');
  document.getElementById('keyInput').value = apiKey;
}

// ══════════════════════════
// START / STOP
// ══════════════════════════
async function toggleRun() {
  if (running) return stopRun();

  // Start camera
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 800 } }
    });
    vid.srcObject = stream;
    document.getElementById('camOverlay').classList.add('hide');
  } catch(e) {
    setStatus('off', 'Caméra inaccessible');
    return;
  }

  running = true;
  lastSentFrame = null;
  document.getElementById('mainBtn').textContent = 'STOP';
  document.getElementById('mainBtn').classList.add('running');
  setStatus('on', 'Scan actif — hands free');

  // Start scan loop
  scanOnce(); // First scan immediately
  timer = setInterval(scanOnce, INTERVAL);
}

function stopRun() {
  running = false;
  if (timer) { clearInterval(timer); timer = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('mainBtn').textContent = 'START';
  document.getElementById('mainBtn').classList.remove('running');
  setStatus('off', 'Arrêté');
}

// ══════════════════════════
// SCAN LOOP (called every 6s)
// ══════════════════════════
async function scanOnce() {
  if (!running || busy || !vid.videoWidth) return;

  // 1. Capture detection thumbnail
  const thumb = document.createElement('canvas');
  thumb.width = THUMB; thumb.height = THUMB;
  const tctx = thumb.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(vid, 0, 0, THUMB, THUMB);
  const currentFrame = tctx.getImageData(0, 0, THUMB, THUMB).data;

  // 2. Compare to last SENT frame (not last captured)
  if (lastSentFrame) {
    const diff = pixelDiff(lastSentFrame, currentFrame);
    if (diff < CHANGE_THRESH) {
      // Same question — skip
      setStatus('on', `Même question (${diff.toFixed(1)}%) — attente...`);
      return;
    }
    setStatus('scan', `Changement ${diff.toFixed(0)}% — analyse...`);
  } else {
    setStatus('scan', 'Premier scan...');
  }

  // 3. Capture high-res frame for API
  busy = true;
  document.getElementById('scanline').classList.add('on');

  let w = vid.videoWidth, h = vid.videoHeight;
  const ratio = Math.min(IMG_MAX / w, IMG_MAX / h, 1);
  w = Math.round(w * ratio); h = Math.round(h * ratio);
  cvs.width = w; cvs.height = h;
  cvs.getContext('2d').drawImage(vid, 0, 0, w, h);
  const b64 = cvs.toDataURL('image/jpeg', IMG_Q).split(',')[1];

  // 4. Send to API (race 4 models)
  const t0 = performance.now();

  const prompt = `This is a photo of an exam question (multiple choice A/B/C/D).
Give ONLY the correct letter and a very short reason.
Format:
ANSWER: X
WHY: ...`;

  try {
    const picks = [];
    for (let i = 0; i < 4; i++) picks.push(MODELS[(modelIdx + i) % MODELS.length]);
    modelIdx = (modelIdx + 4) % MODELS.length;

    const text = await raceAPI(picks, prompt, b64);
    const ms = Math.round(performance.now() - t0);

    const letter = (text.match(/ANSWER:\s*([A-D])/i) || [])[1] || '?';
    const why = (text.match(/WHY:\s*(.+)/i) || [])[1] || text.substring(0, 80);

    // Save this frame as "last sent" so we don't re-analyze same question
    lastSentFrame = currentFrame;

    // Show result
    showBig(letter, why);
    addStream(letter, why, ms);
    count++;
    document.getElementById('countEl').textContent = count;
    setStatus('on', `✓ ${letter} — ${ms}ms`);

  } catch(e) {
    addStreamErr(e.message);
    setStatus('on', 'Erreur — retry dans 6s');
  }

  document.getElementById('scanline').classList.remove('on');
  busy = false;
}

// ══════════════════════════
// PIXEL DIFF
// ══════════════════════════
function pixelDiff(a, b) {
  let d = 0, n = a.length / 4;
  for (let i = 0; i < a.length; i += 4) {
    const avg = (Math.abs(a[i]-b[i]) + Math.abs(a[i+1]-b[i+1]) + Math.abs(a[i+2]-b[i+2])) / 3;
    if (avg > PX_SENS) d++;
  }
  return (d / n) * 100;
}

// ══════════════════════════
// API RACE
// ══════════════════════════
async function raceAPI(models, prompt, b64) {
  var errors = [];

  for (var i = 0; i < models.length; i++) {
    var model = models[i];
    try {
      var res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey,
          'HTTP-Referer': location.href,
          'X-Title': 'ATPL-Solver'
        },
        body: JSON.stringify({
          model: model,
          messages: [{
            role: 'user',
            content: [
              { type: 'text', text: prompt },
              { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + b64 } }
            ]
          }],
          max_tokens: 80,
          temperature: 0
        })
      });

      var json = await res.json();

      if (json.choices && json.choices[0] && json.choices[0].message && json.choices[0].message.content) {
        return json.choices[0].message.content;
      }

      var errMsg = json.error ? (json.error.message || JSON.stringify(json.error).substring(0, 150)) : ('HTTP ' + res.status);
      errors.push(model.split('/').pop() + ': ' + errMsg);

      // If rate limited, small pause
      if (res.status === 429 || res.status === 503) {
        await new Promise(function(r) { setTimeout(r, 2000); });
      }
    } catch(e) {
      errors.push(model.split('/').pop() + ': ' + e.message);
    }
  }

  throw new Error(errors.join(' | '));
}

// ══════════════════════════
// UI
// ══════════════════════════
function showBig(letter, why) {
  var el = document.getElementById('answerOverlay');
  document.getElementById('bigLetter').textContent = letter;
  document.getElementById('bigWhy').textContent = why;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(showBig._t);
  showBig._t = setTimeout(function() { el.classList.remove('show'); }, 5000);
}

function addStream(letter, why, ms) {
  var el = document.getElementById('stream');
  var now = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.insertAdjacentHTML('afterbegin',
    '<div class="stream-item"><div class="stream-letter">' + letter +
    '</div><div class="stream-text">' + esc(why) +
    '</div><div class="stream-time">' + (ms/1000).toFixed(1) + 's · ' + now + '</div></div>');
  while (el.children.length > 20) el.lastChild.remove();
}

function addStreamErr(msg) {
  document.getElementById('stream').insertAdjacentHTML('afterbegin',
    '<div class="stream-err">' + esc(msg) + '</div>');
}

function setStatus(state, label) {
  var dot = document.getElementById('dot');
  dot.className = 'dot';
  if (state === 'on') dot.classList.add('on');
  else if (state === 'scan') dot.classList.add('scan');
  else if (state === 'wait') dot.classList.add('wait');
  document.getElementById('statusLabel').textContent = label;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
