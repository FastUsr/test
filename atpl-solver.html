<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ATPL Solver</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2235;
    --bg-card-hover: #1f2a40;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --accent-glow: #00e5a040;
    --text-primary: #e8edf5;
    --text-secondary: #8892a4;
    --text-dim: #4a5568;
    --border: #2a3548;
    --danger: #ff4d6a;
    --warning: #ffb020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(180deg, var(--bg-primary) 60%, transparent);
    backdrop-filter: blur(12px);
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700;
    color: var(--bg-primary);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 15px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .topbar-subtitle {
    font-size: 11px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .topbar-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse-dot 2s ease infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
  }

  /* Main container */
  .container {
    padding: 72px 16px 32px;
    max-width: 480px;
    margin: 0 auto;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* Camera section */
  .camera-section {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-card);
    aspect-ratio: 4/3;
  }
  .camera-section video,
  .camera-section canvas,
  .camera-section img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .camera-section canvas { display: none; }

  .camera-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg-card);
    gap: 12px;
    transition: opacity 0.3s;
  }
  .camera-overlay.hidden { opacity: 0; pointer-events: none; }
  .camera-overlay svg { width: 48px; height: 48px; color: var(--text-dim); }
  .camera-overlay span {
    font-size: 13px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Captured preview */
  .preview-img {
    display: none;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .preview-img.visible { display: block; }

  /* Scan line animation */
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0; display: none;
    animation: scan 2s ease-in-out infinite;
  }
  .scan-line.active { display: block; }
  @keyframes scan {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
  }

  /* Corner markers */
  .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; }
  .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  /* Controls */
  .controls {
    display: flex; gap: 10px;
  }
  .btn {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-user-select: none;
  }
  .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: var(--bg-primary);
  }
  .btn-primary:active { transform: scale(0.97); filter: brightness(0.9); }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
  }

  .btn-secondary {
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-secondary:active { background: var(--bg-card-hover); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* Answer card */
  .answer-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .answer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .answer-header-left {
    display: flex; align-items: center; gap: 8px;
  }
  .answer-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .answer-tag.processing {
    background: var(--warning);
    color: var(--bg-primary);
    animation: blink 1s ease infinite;
  }
  @keyframes blink {
    50% { opacity: 0.5; }
  }

  .answer-body {
    padding: 18px;
  }
  .answer-body p {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .answer-body .correct-answer {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
  }

  /* Loading dots */
  .loading-dots { display: flex; gap: 6px; padding: 20px 18px; }
  .loading-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.4s ease infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); background: var(--accent); }
  }

  /* Error */
  .error-msg {
    padding: 14px 18px;
    background: #ff4d6a15;
    border: 1px solid #ff4d6a40;
    border-radius: 12px;
    color: var(--danger);
    font-size: 13px;
    line-height: 1.5;
    font-family: 'JetBrains Mono', monospace;
  }

  /* File upload fallback */
  .upload-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .upload-row label {
    text-decoration: underline;
    cursor: pointer;
    color: var(--accent);
  }
  #fileInput { display: none; }

  /* History section */
  .history-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    border: none; background: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .history-toggle svg {
    width: 14px; height: 14px;
    transition: transform 0.2s;
  }
  .history-toggle.open svg { transform: rotate(180deg); }

  .history-list {
    display: none; flex-direction: column; gap: 10px;
  }
  .history-list.visible { display: flex; }

  .history-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .history-item:active { background: var(--bg-card-hover); }
  .history-item-q {
    font-size: 13px; color: var(--text-secondary);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item-a {
    font-size: 14px; font-weight: 600;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-icon">A</div>
    <div>
      <div class="topbar-title">ATPL Solver</div>
      <div class="topbar-subtitle">English · Camera AI</div>
    </div>
  </div>
  <div class="topbar-status">
    <div class="status-dot"></div>
    <span>READY</span>
  </div>
</div>

<div class="container">
  <!-- Camera -->
  <div class="camera-section" id="cameraSection">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" class="preview-img" alt="Captured">
    <div class="scan-line" id="scanLine"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="camera-overlay" id="cameraOverlay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Tap pour activer la caméra</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controlsInit">
    <button class="btn btn-primary" id="btnStartCam" onclick="startCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Activer caméra
    </button>
  </div>

  <div class="controls" id="controlsCapture" style="display:none;">
    <button class="btn btn-primary" id="btnCapture" onclick="capture()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/></svg>
      Capturer
    </button>
    <button class="btn btn-secondary" onclick="switchCamera()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
    </button>
  </div>

  <div class="controls" id="controlsAnalyze" style="display:none;">
    <button class="btn btn-primary" id="btnAnalyze" onclick="analyzeImage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Analyser
    </button>
    <button class="btn btn-secondary" onclick="retake()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1014.85-3.36L23 10"/></svg>
      Reprendre
    </button>
  </div>

  <!-- Upload fallback -->
  <div class="upload-row">
    <span>ou</span>
    <label for="fileInput">importer une photo</label>
    <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
  </div>

  <!-- Answer area -->
  <div id="answerArea"></div>

  <!-- History -->
  <button class="history-toggle" id="historyToggle" onclick="toggleHistory()" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    Historique
  </button>
  <div class="history-list" id="historyList"></div>
</div>

<script>
  let stream = null;
  let facingMode = 'environment';
  let capturedBase64 = null;
  let history = [];

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const preview = document.getElementById('preview');
  const overlay = document.getElementById('cameraOverlay');
  const scanLine = document.getElementById('scanLine');

  // Start camera
  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1440 } }
      });
      video.srcObject = stream;
      video.style.display = 'block';
      preview.classList.remove('visible');
      overlay.classList.add('hidden');

      document.getElementById('controlsInit').style.display = 'none';
      document.getElementById('controlsCapture').style.display = 'flex';
      document.getElementById('controlsAnalyze').style.display = 'none';
    } catch (e) {
      console.error(e);
      alert("Impossible d'accéder à la caméra. Vérifie les permissions ou utilise l'import photo.");
    }
  }

  function switchCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  }

  // Capture
  function capture() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    capturedBase64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

    preview.src = 'data:image/jpeg;base64,' + capturedBase64;
    preview.classList.add('visible');
    video.style.display = 'none';

    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;

    document.getElementById('controlsCapture').style.display = 'none';
    document.getElementById('controlsAnalyze').style.display = 'flex';
  }

  // Handle file upload
  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      capturedBase64 = ev.target.result.split(',')[1];
      preview.src = ev.target.result;
      preview.classList.add('visible');
      video.style.display = 'none';
      overlay.classList.add('hidden');

      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

      document.getElementById('controlsInit').style.display = 'none';
      document.getElementById('controlsCapture').style.display = 'none';
      document.getElementById('controlsAnalyze').style.display = 'flex';
    };
    reader.readAsDataURL(file);
  }

  // Retake
  function retake() {
    capturedBase64 = null;
    preview.classList.remove('visible');
    document.getElementById('answerArea').innerHTML = '';
    startCamera();
  }

  // Analyze
  async function analyzeImage() {
    if (!capturedBase64) return;

    const answerArea = document.getElementById('answerArea');
    scanLine.classList.add('active');
    document.getElementById('btnAnalyze').disabled = true;

    // Show loading
    answerArea.innerHTML = `
      <div class="answer-card">
        <div class="answer-header">
          <div class="answer-header-left">
            <span class="answer-tag processing">Analyse en cours</span>
          </div>
        </div>
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    `;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: {
                  type: "base64",
                  media_type: "image/jpeg",
                  data: capturedBase64
                }
              },
              {
                type: "text",
                text: `Tu es un expert ATPL (Airline Transport Pilot License). Analyse cette photo d'une question d'examen ATPL (matière : English / Aviation English).

INSTRUCTIONS :
1. Lis et retranscris la question et toutes les options (A, B, C, D)
2. Identifie la BONNE RÉPONSE
3. Explique BRIÈVEMENT pourquoi c'est la bonne réponse (2-3 phrases max)
4. Si c'est une question de vocabulaire aviation, donne la définition du terme clé

FORMAT DE RÉPONSE :
📋 QUESTION : [retranscription]

✅ RÉPONSE : [Lettre] — [texte de la réponse]

💡 EXPLICATION : [explication courte]

Si l'image n'est pas une question ATPL, dis-le simplement.`
              }
            ]
          }]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message || 'API error');

      const text = data.content.map(c => c.text || '').join('');

      // Extract the answer letter
      const answerMatch = text.match(/RÉPONSE\s*:\s*([A-D])/i);
      const answerLetter = answerMatch ? answerMatch[1] : null;

      // Save to history
      const questionMatch = text.match(/QUESTION\s*:\s*(.+?)(?=\n|✅)/s);
      history.unshift({
        question: questionMatch ? questionMatch[1].trim().substring(0, 80) : 'Question ATPL',
        answer: answerLetter || '?',
        fullText: text,
        time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
      });
      updateHistory();

      scanLine.classList.remove('active');

      answerArea.innerHTML = `
        <div class="answer-card">
          <div class="answer-header">
            <div class="answer-header-left">
              <span class="answer-tag">Résolu</span>
            </div>
            ${answerLetter ? `<span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);">${answerLetter}</span>` : ''}
          </div>
          <div class="answer-body">
            <p>${escapeHtml(text)}</p>
          </div>
        </div>
      `;
    } catch (err) {
      scanLine.classList.remove('active');
      answerArea.innerHTML = `<div class="error-msg">Erreur : ${escapeHtml(err.message)}<br><br>Si le problème persiste, vérifie ta connexion.</div>`;
    }

    document.getElementById('btnAnalyze').disabled = false;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // History
  function toggleHistory() {
    const btn = document.getElementById('historyToggle');
    const list = document.getElementById('historyList');
    btn.classList.toggle('open');
    list.classList.toggle('visible');
  }

  function updateHistory() {
    const toggle = document.getElementById('historyToggle');
    const list = document.getElementById('historyList');
    if (history.length > 0) toggle.style.display = 'flex';

    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="showHistoryItem(${i})">
        <div class="history-item-q">${escapeHtml(h.question)}</div>
        <div class="history-item-a">${h.time} · Réponse : ${h.answer}</div>
      </div>
    `).join('');
  }

  function showHistoryItem(i) {
    const h = history[i];
    const answerArea = document.getElementById('answerArea');
    answerArea.innerHTML = `
      <div class="answer-card">
        <div class="answer-header">
          <div class="answer-header-left">
            <span class="answer-tag">Historique</span>
          </div>
          <span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);">${h.answer}</span>
        </div>
        <div class="answer-body">
          <p>${escapeHtml(h.fullText)}</p>
        </div>
      </div>
    `;
  }

  // Auto-start camera on overlay tap
  document.getElementById('cameraOverlay').addEventListener('click', startCamera);
</script>
</body>
</html>
