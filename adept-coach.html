<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADEPT Coach</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
:root{--bg:#070a10;--card:#111825;--accent:#3b82f6;--t1:#e4eaf2;--t2:#5d6e82;--border:#1a2536;--red:#ff3860;--green:#00e68a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.top h1{font-size:13px;font-weight:700}
.top-r{display:flex;gap:8px;align-items:center}
.top-r span{font-size:10px;color:var(--green)}
.top-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--t2);padding:3px 8px;font:10px 'JetBrains Mono',monospace;cursor:pointer}

.btn-row{display:flex;gap:6px;padding:6px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.btn{padding:12px;border:none;border-radius:10px;font:700 13px 'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;flex:1}
.btn:active{transform:scale(.97)}
.btn-scan{background:var(--accent);color:#fff}
.btn-scan:disabled{opacity:.3}
.btn-auto{background:#1e293b;color:var(--t2);border:1px solid var(--border)}
.btn-auto.on{background:var(--green);color:var(--bg);border-color:var(--green)}
.btn-sm{flex:0 0 48px;background:none;border:1px solid var(--border);color:var(--t2);border-radius:10px;font-size:14px;cursor:pointer;padding:12px}

.cam{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
.cam video{width:100%;height:100%;object-fit:cover;display:block}
.cam canvas{display:none}
.cam-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .3s}
.cam-msg.hide{opacity:0;pointer-events:none}
.cam-msg span{font-size:12px;color:var(--t2)}

.bottom{flex-shrink:0;max-height:40vh;overflow-y:auto;background:var(--card);border-top:1px solid var(--border)}
.answer{padding:14px 16px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}}
.answer pre{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t1);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.answer-err{padding:10px 16px;font-size:11px;color:var(--red)}
.answer-divider{height:1px;background:var(--border);margin:0}

.setup{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.setup.hide{display:none}
.setup-box{max-width:360px;width:100%;display:flex;flex-direction:column;gap:14px}
.setup-box h2{font-size:16px}
.setup-box p{font-size:11px;color:var(--t2);line-height:1.6}
.setup-box a{color:var(--accent)}
.setup-input{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--t1);font:12px 'JetBrains Mono',monospace;outline:none}
.setup-input:focus{border-color:var(--accent)}
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-box">
    <h2>ADEPT Coach</h2>
    <p>Même clé Gemini que ton solver ATPL.</p>
    <input class="setup-input" id="keyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
    <button class="btn btn-scan" onclick="saveKey()">Go</button>
  </div>
</div>

<div class="top">
  <h1>ADEPT Coach — Ryanair FO</h1>
  <div class="top-r">
    <span id="countEl">0</span>
    <button class="top-btn" onclick="resetAll()">↺</button>
    <button class="top-btn" onclick="showSetup()">API</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-scan" id="scanBtn" onclick="scan()">SCAN</button>
  <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">AUTO</button>
  <button class="btn-sm" id="camBtn" onclick="cycleCam()">📷</button>
</div>

<div class="cam" id="cam">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cvs"></canvas>
  <div class="cam-msg" id="camMsg"><span>Appuie SCAN</span></div>
</div>

<div class="bottom" id="bottom"></div>

<script>
var apiKey = localStorage.getItem('gem_k') || '';
var busy = false;
var autoMode = false;
var autoTimer = null;
var camStream = null;
var allCams = [];
var camIdx = 0;
var count = 0;
var chatHistory = [];
var lastFrame = null;

var vid = document.getElementById('vid');
var cvs = document.getElementById('cvs');

if (apiKey) document.getElementById('setup').classList.add('hide');

function saveKey() {
  var k = document.getElementById('keyInput').value.trim().replace(/[\s\u200B\u00A0]/g, '');
  if (!k) return;
  apiKey = k; localStorage.setItem('gem_k', k);
  document.getElementById('setup').classList.add('hide');
}
function showSetup() {
  document.getElementById('setup').classList.remove('hide');
  document.getElementById('keyInput').value = apiKey;
}
function resetAll() {
  chatHistory = []; count = 0; lastFrame = null;
  document.getElementById('countEl').textContent = '0';
  document.getElementById('bottom').innerHTML = '';
}

// ═══════ CAMERA ═══════
async function ensureCam() {
  if (camStream && vid.videoWidth) return true;
  try {
    if (camStream) camStream.getTracks().forEach(function(t){t.stop()});
    var devs = await navigator.mediaDevices.enumerateDevices();
    var backs = devs.filter(function(d){return d.kind==='videoinput'&&(!d.label||!d.label.match(/front|avant|facetime/i))});
    if (!backs.length) backs = devs.filter(function(d){return d.kind==='videoinput'});
    allCams = backs;
    var uw = backs.find(function(d){return d.label&&d.label.match(/ultra|wide|grand.?angle|0\.5/i)&&!d.label.match(/tele/i)});
    var c;
    if (uw) c = {video:{deviceId:{exact:uw.deviceId},width:{ideal:1920},height:{ideal:1080}}};
    else if (backs.length>1) c = {video:{deviceId:{exact:backs[1].deviceId},width:{ideal:1920},height:{ideal:1080}}};
    else c = {video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}};
    camStream = await navigator.mediaDevices.getUserMedia(c);
    vid.srcObject = camStream;
    document.getElementById('camMsg').classList.add('hide');
    await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1000)});
    return true;
  } catch(e) {
    try {
      camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      vid.srcObject = camStream;
      document.getElementById('camMsg').classList.add('hide');
      await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1000)});
      return true;
    } catch(e2) { return false; }
  }
}

async function cycleCam() {
  if (allCams.length<2) return;
  camIdx = (camIdx+1)%allCams.length;
  if (camStream) camStream.getTracks().forEach(function(t){t.stop()});
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:allCams[camIdx].deviceId},width:{ideal:1920},height:{ideal:1080}}});
    vid.srcObject = camStream;
    lastFrame = null;
  } catch(e){}
}

// ═══════ AUTO MODE ═══════
function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('autoBtn').classList.toggle('on', autoMode);
  document.getElementById('autoBtn').textContent = autoMode ? 'AUTO ●' : 'AUTO';
  if (autoMode) {
    lastFrame = null;
    autoTimer = setInterval(autoTick, 4000);
  } else {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
  }
}

async function autoTick() {
  if (busy) return;
  if (!(await ensureCam())) return;
  if (!vid.videoWidth) return;
  // Pixel diff check
  var t = document.createElement('canvas'); t.width=96; t.height=96;
  var tx = t.getContext('2d',{willReadFrequently:true});
  tx.drawImage(vid,0,0,96,96);
  var cur = tx.getImageData(0,0,96,96).data;
  if (lastFrame) {
    var d=0,n=cur.length/4;
    for(var i=0;i<cur.length;i+=4){if((Math.abs(cur[i]-lastFrame[i])+Math.abs(cur[i+1]-lastFrame[i+1])+Math.abs(cur[i+2]-lastFrame[i+2]))/3>15)d++}
    if((d/n)*100<4) return; // Same screen
  }
  lastFrame = cur;
  await doAnalysis();
}

// ═══════ MANUAL SCAN ═══════
async function scan() {
  if (busy) return;
  if (!(await ensureCam())) return;
  lastFrame = null;
  await doAnalysis();
}

// ═══════ CORE ANALYSIS ═══════
async function doAnalysis() {
  busy = true;
  document.getElementById('scanBtn').disabled = true;

  // Capture full res
  var w = vid.videoWidth, h = vid.videoHeight;
  var r = Math.min(1920/w, 1920/h, 1);
  w = Math.round(w*r); h = Math.round(h*r);
  cvs.width = w; cvs.height = h;
  cvs.getContext('2d').drawImage(vid,0,0,w,h);
  var b64 = cvs.toDataURL('image/jpeg',0.85).split(',')[1];

  // Build simple conversational prompt — like talking to Gemini app
  var prompt = `This screenshot shows one or more personality test questions. Each question has a LEFT statement and a RIGHT statement with a slider between them.

The slider goes: Strongly Agree (left) — Agree — Slightly Agree — Neutral — Slightly Agree — Agree — Strongly Agree (right)

I'm applying as First Officer at Ryanair. For each question pair visible on screen, tell me:
- Which side: LEFT or RIGHT
- Where on the slider: Strongly, Mostly, or Slightly

Be direct. Example format:
1. RIGHT — Slightly
2. LEFT — Mostly

Then one short line explaining each.`;

  if (chatHistory.length > 0) {
    prompt += "\n\nMy previous choices this session:\n";
    for (var i = 0; i < chatHistory.length; i++) {
      prompt += "- " + chatHistory[i] + "\n";
    }
  }

  try {
    var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: [{parts:[
          {inline_data:{mime_type:'image/jpeg',data:b64}},
          {text: prompt}
        ]}],
        generationConfig: {maxOutputTokens:1024, temperature:0.3}
      })
    });

    var json = await res.json();
    if (!res.ok || json.error) {
      var msg = json.error ? json.error.message : 'Erreur';
      if (res.status===429) msg = 'Quota — active la facturation dans AI Studio';
      throw new Error(msg);
    }

    var text = '';
    var parts = json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts;
    if (parts) for (var j=0;j<parts.length;j++){if(parts[j].text)text+=parts[j].text}
    if (!text) throw new Error('Réponse vide');

    // Save summary to history for consistency
    var summary = text.split('\n')[0].substring(0, 100);
    chatHistory.push(summary);
    count++;
    document.getElementById('countEl').textContent = count;

    // Display raw response — no parsing, just show what Gemini says
    addAnswer(text);

    // Pause in auto mode
    if (autoMode) await new Promise(function(r){setTimeout(r,4000)});

  } catch(e) {
    addError(e.message);
  }

  document.getElementById('scanBtn').disabled = false;
  busy = false;
}

// ═══════ UI ═══════
function addAnswer(text) {
  var el = document.getElementById('bottom');
  el.insertAdjacentHTML('afterbegin',
    '<div class="answer"><pre>' + esc(text) + '</pre></div><div class="answer-divider"></div>');
  while (el.children.length > 40) el.lastChild.remove();
  el.scrollTop = 0;
}
function addError(msg) {
  document.getElementById('bottom').insertAdjacentHTML('afterbegin',
    '<div class="answer-err">' + esc(msg) + '</div>');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.getElementById('camMsg').addEventListener('click', scan);
</script>
</body>
</html>
