<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADEPT Coach</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap');
:root{--bg:#070a10;--card:#111825;--accent:#3b82f6;--t1:#e4eaf2;--t2:#5d6e82;--border:#1a2536;--red:#ff3860;--green:#00e68a;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--t1);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.top h1{font-size:13px;font-weight:700}
.top-r{display:flex;gap:8px;align-items:center}
.top-r span{font-size:10px;color:var(--green)}
.top-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--t2);padding:3px 8px;font:10px 'JetBrains Mono',monospace;cursor:pointer}

.btn-row{display:flex;gap:6px;padding:6px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.btn{padding:12px;border:none;border-radius:10px;font:700 13px 'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;flex:1}
.btn:active{transform:scale(.97)}
.btn-scan{background:var(--accent);color:#fff}
.btn-scan:disabled{opacity:.3}
.btn-auto{background:#1e293b;color:var(--t2);border:1px solid var(--border)}
.btn-auto.on{background:var(--green);color:var(--bg);border-color:var(--green)}
.btn-sm{flex:0 0 48px;background:none;border:1px solid var(--border);color:var(--t2);border-radius:10px;font-size:14px;cursor:pointer;padding:12px}

.cam{flex:1;position:relative;background:#000;overflow:hidden;min-height:0}
.cam video{width:100%;height:100%;object-fit:cover;display:block}
.cam canvas{display:none}
.cam-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .3s}
.cam-msg.hide{opacity:0;pointer-events:none}
.cam-msg span{font-size:12px;color:var(--t2)}

.bottom{flex-shrink:0;max-height:40vh;overflow-y:auto;background:var(--card);border-top:1px solid var(--border)}
.answer{padding:10px 14px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}}
.answer pre{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t1);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.answer-err{padding:10px 14px;font-size:11px;color:var(--red)}
.answer-divider{height:1px;background:var(--border);margin:0}

.setup{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.setup.hide{display:none}
.setup-box{max-width:360px;width:100%;display:flex;flex-direction:column;gap:14px}
.setup-box h2{font-size:16px}
.setup-box p{font-size:11px;color:var(--t2);line-height:1.6}
.setup-input{width:100%;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--t1);font:12px 'JetBrains Mono',monospace;outline:none}
.setup-input:focus{border-color:var(--accent)}
</style>
</head>
<body>

<div class="setup" id="setup">
  <div class="setup-box">
    <h2>ADEPT Coach</h2>
    <p>Clé API Gemini</p>
    <input class="setup-input" id="keyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
    <button class="btn btn-scan" onclick="saveKey()">Go</button>
  </div>
</div>

<div class="top">
  <h1>ADEPT Coach — Ryanair FO</h1>
  <div class="top-r">
    <span id="countEl">0</span>
    <button class="top-btn" onclick="resetAll()">↺</button>
    <button class="top-btn" onclick="showSetup()">API</button>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-scan" id="scanBtn" onclick="scan()">SCAN</button>
  <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()">AUTO</button>
  <button class="btn-sm" id="camBtn" onclick="cycleCam()">📷</button>
</div>

<div class="cam" id="cam">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="cvs"></canvas>
  <div class="cam-msg" id="camMsg"><span>Appuie SCAN</span></div>
</div>

<div class="bottom" id="bottom"></div>

<script>
var apiKey = localStorage.getItem('gem_k') || '';
var busy = false;
var autoMode = false;
var autoTimer = null;
var camStream = null;
var allCams = [];
var camIdx = 0;
var count = 0;
var conversation = [];
var lastFrame = null;

var vid = document.getElementById('vid');
var cvs = document.getElementById('cvs');

if (apiKey) document.getElementById('setup').classList.add('hide');

var SYSTEM_PROMPT = `You are a psychometrician specializing in the ADEPT-15 personality assessment. You advise a candidate for Ryanair First Officer.

═══ THE RYANAIR FO PERSONALITY (target scores 1-10) ═══

HIGH (8-10): Cooperation 10, Rule-following 10, Dependability 9, Composure 9, Modesty 9, Adaptability 8
MEDIUM (5-6): Ambition 5, Sociability 5, Interpersonal sensitivity 5, Intellectual curiosity 5
LOW (2-4): Risk-taking 2, Dominance 3, Innovation 3, Competitiveness 3, Autonomy 3

═══ HOW TO REASON (do this in your thinking, every time) ═══

For each statement in the pair:
1. Ask: "What ADEPT-15 trait does this statement measure?"
2. Look up that trait's target score above.
3. The statement that aligns with a HIGHER target score wins.

KEY: A statement is good if it pushes a HIGH trait upward OR a LOW trait downward.
A statement is bad if it pushes a LOW trait upward OR a HIGH trait downward.

═══ COMMON TRAPS TO REASON THROUGH ═══

Many statements SOUND positive but map to LOW-target traits. You must see through the surface:

• "I do all I can to achieve my goals even when difficult" → SOUNDS like dedication. Actually measures Ambition (target: 5) and Competitiveness (target: 3). This is a NEGATIVE for the FO profile.
• "I enjoy a challenge" → SOUNDS brave. Actually measures Risk-taking (target: 2). NEGATIVE.
• "I take initiative" → SOUNDS proactive. Actually measures Autonomy (target: 3) and Dominance (target: 3). NEGATIVE.
• "I'm creative in solving problems" → SOUNDS smart. Actually measures Innovation (target: 3). NEGATIVE.
• "I'm confident in my abilities" → SOUNDS healthy. Actually measures Dominance (target: 3) or low Modesty. NEGATIVE.
• "I thrive under pressure" → SOUNDS resilient. Actually measures Risk-taking (target: 2). NEGATIVE. Note: "I stay calm under pressure" is DIFFERENT — that's Composure (target: 9). POSITIVE.
• "I push myself to be the best" → SOUNDS motivated. Actually measures Competitiveness (target: 3). NEGATIVE.

Conversely, some statements SOUND negative but are actually fine:
• "I often think about how things work" → Intellectual curiosity (target: 5). Neutral. Almost always better than ambition/risk/ego alternatives.
• "I don't know why I do some things" → Low self-awareness. Bad, but less bad than "I have a quick temper" (Composure: target 9 violated).
• "I prefer routine" → Predictability = high Dependability (target: 9). POSITIVE.
• "I wait for instructions" → Low Autonomy (target: 3 anyway) + high Cooperation (target: 10). POSITIVE.
• "I'm content with how things are" → Low Ambition (target: 5). Acceptable to slightly positive for FO.

═══ DEGREE LOGIC ═══

Strongly = one side clearly maps to a target 8-10 trait AND the other clearly maps to a target 2-3 trait. Obvious mismatch. Example: teamwork vs working alone.
Mostly = one side is clearly better but the other isn't terrible. Example: routine vs moderate ambition.
Slightly = both sides are close in target score, or both are medium traits, or both are somewhat negative. Marginal call. Example: curiosity vs sociability.

Use all three degrees naturally. "Strongly" should be maybe 40% of answers, "Mostly" about 40%, "Slightly" about 20%. If you're saying Strongly every time, you're not reasoning enough.

═══ OUTPUT FORMAT ═══

For each pair on screen, output exactly:
→ LEFT or RIGHT — Strongly/Mostly/Slightly
[trait mapped: 3-6 words]

Multiple pairs separated by blank line.

Example:
→ LEFT — Mostly
[curiosity neutral > ambition flag]

→ RIGHT — Strongly  
[composure 9 > impulsiveness]

NOTHING else. No disclaimers, no explanations, no preamble. Just the lines above.`;

function saveKey() {
  var k = document.getElementById('keyInput').value.trim().replace(/[\s\u200B\u00A0]/g, '');
  if (!k) return;
  apiKey = k; localStorage.setItem('gem_k', k);
  document.getElementById('setup').classList.add('hide');
}
function showSetup() {
  document.getElementById('setup').classList.remove('hide');
  document.getElementById('keyInput').value = apiKey;
}

async function ensureCam() {
  if (camStream && vid.videoWidth) return true;
  try {
    if (camStream) camStream.getTracks().forEach(function(t){t.stop()});
    var tempStream = await navigator.mediaDevices.getUserMedia({video:true});
    tempStream.getTracks().forEach(function(t){t.stop()});
    var devs = await navigator.mediaDevices.enumerateDevices();
    allCams = devs.filter(function(d){return d.kind==='videoinput'});
    var uw = allCams.find(function(d){return d.label&&d.label.match(/ultra|wide|grand.?angle|0\.5/i)&&!d.label.match(/tele|front|avant/i)});
    var c;
    if (uw) {
      c = {video:{deviceId:{exact:uw.deviceId},width:{ideal:1920},height:{ideal:1080}}};
      camIdx = allCams.indexOf(uw);
    } else {
      c = {video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}};
    }
    camStream = await navigator.mediaDevices.getUserMedia(c);
    vid.srcObject = camStream;
    document.getElementById('camMsg').classList.add('hide');
    await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1500)});
    return true;
  } catch(e) {
    try {
      camStream = await navigator.mediaDevices.getUserMedia({video:true});
      vid.srcObject = camStream;
      document.getElementById('camMsg').classList.add('hide');
      await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1500)});
      return true;
    } catch(e2) { return false; }
  }
}

async function cycleCam() {
  if (allCams.length<2) return;
  camIdx = (camIdx+1)%allCams.length;
  try {
    if (camStream) { camStream.getTracks().forEach(function(t){t.stop()}); camStream = null; }
    camStream = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:allCams[camIdx].deviceId},width:{ideal:1920},height:{ideal:1080}}});
    vid.srcObject = camStream;
    lastFrame = null;
    await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1500)});
    var label = allCams[camIdx].label || 'Cam ' + (camIdx+1);
    document.getElementById('countEl').textContent = count + ' · ' + label.substring(0,20);
  } catch(e){
    camIdx = (camIdx+1)%allCams.length;
    try {
      camStream = await navigator.mediaDevices.getUserMedia({video:{deviceId:{exact:allCams[camIdx].deviceId},width:{ideal:1920},height:{ideal:1080}}});
      vid.srcObject = camStream;
      await new Promise(function(r){vid.onloadeddata=r;setTimeout(r,1500)});
    } catch(e2){}
  }
}

function toggleAuto() {
  autoMode = !autoMode;
  document.getElementById('autoBtn').classList.toggle('on', autoMode);
  document.getElementById('autoBtn').textContent = autoMode ? 'AUTO ●' : 'AUTO';
  if (autoMode) {
    lastFrame = null;
    autoTimer = setInterval(autoTick, 4000);
  } else {
    if (autoTimer) clearInterval(autoTimer);
    autoTimer = null;
  }
}

async function autoTick() {
  if (busy) return;
  if (!(await ensureCam())) return;
  if (!vid.videoWidth) return;
  var t = document.createElement('canvas'); t.width=96; t.height=96;
  var tx = t.getContext('2d',{willReadFrequently:true});
  tx.drawImage(vid,0,0,96,96);
  var cur = tx.getImageData(0,0,96,96).data;
  if (lastFrame) {
    var d=0,n=cur.length/4;
    for(var i=0;i<cur.length;i+=4){if((Math.abs(cur[i]-lastFrame[i])+Math.abs(cur[i+1]-lastFrame[i+1])+Math.abs(cur[i+2]-lastFrame[i+2]))/3>15)d++}
    if((d/n)*100<4) return;
  }
  lastFrame = cur;
  await doAnalysis();
}

async function scan() {
  if (busy) return;
  if (!(await ensureCam())) return;
  lastFrame = null;
  await doAnalysis();
}

function resetAll() {
  conversation = []; count = 0; lastFrame = null;
  document.getElementById('countEl').textContent = '0';
  document.getElementById('bottom').innerHTML = '';
}

async function doAnalysis() {
  busy = true;
  document.getElementById('scanBtn').disabled = true;

  var w = vid.videoWidth, h = vid.videoHeight;
  var r = Math.min(1280/w, 1280/h, 1);
  w = Math.round(w*r); h = Math.round(h*r);
  cvs.width = w; cvs.height = h;
  cvs.getContext('2d').drawImage(vid,0,0,w,h);
  var b64 = cvs.toDataURL('image/jpeg',0.7).split(',')[1];

  var userParts = [
    {text: conversation.length === 0 ? "Go:" : "Next:"},
    {inline_data:{mime_type:'image/jpeg',data:b64}}
  ];

  conversation.push({role: 'user', parts: userParts});

  try {
    var res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=' + apiKey, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contents: conversation,
        systemInstruction: {parts: [{text: SYSTEM_PROMPT}]},
        generationConfig: {
          maxOutputTokens: 300,
          temperature: 0.2,
          thinkingConfig: {thinkingBudget: 4096}
        }
      })
    });

    var json = await res.json();
    if (!res.ok || json.error) {
      var msg = json.error ? json.error.message : 'Erreur';
      if (res.status===429) msg = 'Quota — active la facturation';
      throw new Error(msg);
    }

    var text = '';
    var cleanParts = [];
    var allParts = json.candidates&&json.candidates[0]&&json.candidates[0].content&&json.candidates[0].content.parts;
    if (allParts) {
      for (var j=0; j<allParts.length; j++) {
        if (allParts[j].text && !allParts[j].thought) {
          text += allParts[j].text;
          cleanParts.push(allParts[j]);
        }
      }
    }
    if (!text) throw new Error('Réponse vide');

    conversation.push({role: 'model', parts: cleanParts});

    if (conversation.length > 20) {
      conversation = conversation.slice(-18);
    }

    count++;
    document.getElementById('countEl').textContent = count;
    addAnswer(text);

    if (autoMode) await new Promise(function(r){setTimeout(r,3000)});

  } catch(e) {
    conversation.pop();
    addError(e.message);
  }

  document.getElementById('scanBtn').disabled = false;
  busy = false;
}

function addAnswer(text) {
  var el = document.getElementById('bottom');
  var html = esc(text.trim())
    .replace(/→\s*(LEFT)/g,  '→ <b style="color:#3b82f6">$1</b>')
    .replace(/→\s*(RIGHT)/g, '→ <b style="color:#f59e0b">$1</b>')
    .replace(/(Strongly)/g,  '<b style="color:#00e68a">$1</b>')
    .replace(/(Mostly)/g,    '<b style="color:#8be9fd">$1</b>')
    .replace(/(Slightly)/g,  '<b style="color:#bd93f9">$1</b>');
  el.insertAdjacentHTML('afterbegin',
    '<div class="answer"><pre>' + html + '</pre></div><div class="answer-divider"></div>');
  while (el.children.length > 40) el.lastChild.remove();
  el.scrollTop = 0;
}
function addError(msg) {
  document.getElementById('bottom').insertAdjacentHTML('afterbegin',
    '<div class="answer-err">' + esc(msg) + '</div>');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.getElementById('camMsg').addEventListener('click', scan);
</script>
</body>
</html>
